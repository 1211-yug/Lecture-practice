<!doctype html>
<html lang=""en-us>
	<head>
		<meta charest="utf-8">
		<title> Jod Form </title>
		<style>
			h1{
				text-align:center;
			}
			table{
				border-collapse:collapse;
				margin-left:30%;
				font-size:20px;
				font-weight:600;
			}
			td{
				padding:10px;
			}
			textarea{
				font-size:15px;
			}
		</style>
	</head>
	<body>
		<h1>Job Application Form</h1>
		<form>
		<table border="1">
			<tbody>
				<tr>
					<td> Full Name: </td>
					<td><input type="text" placeholder="Enter your name"></td>
				</tr>
				<tr>
					<td> Email Address: </td>
					<td><input type="email"></td>
				</tr>
				<tr>
					<td> Phone Number: </td>
					<td><input type="tel" placeholder="123-456-7890"></td>
				</tr>
				<tr>
					<td> Gender: </td>
					<td><input type="radio" name="gender">Male <input type="radio" name="gender">Female</td>
					
				</tr>
				<tr>
					<td> Job Role: </td>
					<td><select>
							<option>-- Select Role--</option>
							<option>Developer</option>
							<option>Designer</option>
							<option>Manager</option>
						</select>
					</td>
				</tr>
				<tr> 
					<td> Date of Birth: </td>
					<td><input type="date"></td>
				</tr>
				<tr>
					<td> Favorite Color: </td>
					<td><input type="color"></td>
				</tr>
				<tr>
					<td> Upload Resume: </td>
					<td><input type="file"></td>
				</tr>
				<tr>
					<td> Skills: </td>
					<td><input type="checkbox" name="skill"> HTML <input type="checkbox" name="skill"> CSS <input type="checkbox" name="skill"> JavaScript <input type="checkbox" name="skill"> React</td>
				</tr>
				<tr>
					<td> Cover Letter: </td>
					<td><textarea rows="15" cols="60" placeholder="Write something about yourself..."> </textarea></td>
				</tr>
				<tr>
					<td colspan="2" style="text-align:center;"><input type="Submit" value="submit"> <input type="Reset"></td>
				</tr>
			</tbody>
		</table>
		</form>
	</body>
</html>
