<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title> form </title>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css" integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>

        <div class="container">
            <div class="icon text-center mt-2 fs-1">
                <i class="bi bi-bootstrap-fill"></i>
            </div>
            <div class="heading text-center">
                <h1>Checkout Form</h1>
            </div>
            
            <form>
                <div class="">
                    <h2>Billing address </h2>
                </div>
                <div class="row">
                    <div class="col">
                        <label class="form-label mb-2">First name</label>
                        <input type="text" class="form-control mb-2" placeholder="Enter your first name" name="" id="">
                    </div>
                    <div class="col">
                        <label class="form-label mb-2">Last name</label>
                        <input type="text" class="form-control mb-2" placeholder="Enter your last name" name="" id="">
                    </div>
                </div>
                <div>
                    <label class="form-label mb-2">User name</label>
                    <input type="name" class="form-control mb-2" placeholder="Enter your user name" name="" id="">
                </div>
            </form>
            
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        </div>
    </body>
</html>
