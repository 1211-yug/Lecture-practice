<!doctype html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Example</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>

  <!-- Header -->
  <div class="row header bg-dark text-white p-3 align-items-center">
    <div class="col-2 logo">
      <h2>Carousel</h2>
    </div>
    <div class="col">
      <div class="row align-items-center">
        <div class="col mx-2">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb text-secondary">
              <li class="breadcrumb-item"><a href="#">Home</a></li>
              <li class="breadcrumb-item" aria-current="page">Link</li>
              <li class="breadcrumb-item" aria-current="page">Disabled</li>
            </ol>
          </nav>
        </div>
        <div class="col">
          <div class="input-group col">
            <input type="text" class="form-control text-white bg-secondary" placeholder="Search">
          </div>
        </div>
        <div class="col btn">
          <button type="button" class="btn btn-outline-success">Success</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Silder Section -->

  <section>
    <div class="vh-100">
      <div id="carouselExample" class="carousel slide carousel-fade vh-100" data-bs-ride="carousel">
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active"
            aria-current="true" aria-label="Slide 1"></button>
          <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1" aria-label="Slide 2"></button>
          <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2" aria-label="Slide 3"></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item active position-relative" data-bs-interval="3000">
            <img src="./pexels-abdelghani-sad-djaballah-2157717807-35413462.jpg"
              class="d-block w-100 vh-100 object-fit-cover" alt="...">
            <div class="carousel-caption d-none d-md-flex h-100 align-items-center flex-column justify-content-center">
              <h5 class="text-dark fs-2 fw-bold">First slide label</h5>
              <p class="text-dark fs-4 fw-bold">Some representative placeholder content for the first slide.</p>
            </div>
          </div>

          <div class="carousel-item" data-bs-interval="3000">
            <img src="./pexels-justyna-sieczka-2161487384-37569480.jpg" class="d-block w-100 vh-100 object-fit-cover"
              alt="...">
            <div class="carousel-caption d-none d-md-flex h-100 align-items-start flex-column justify-content-center">
              <h5 class="text-dark fs-2 fw-bold">Second slide label</h5>
              <p class="text-dark fs-4 fw-bold">Some representative placeholder content for the Second slide.</p>
            </div>
          </div>

          <div class="carousel-item" data-bs-interval="3000">
            <img src="./pexels-oskar-lekki-2161835424-37771382.jpg" class="d-block w-100 vh-100 object-fit-cover"
              alt="...">
            <div class="carousel-caption d-none d-md-flex h-100 align-items-end flex-column justify-content-center">
              <h5 class="text-white fs-2 fw-bold">Third slide label</h5>
              <p class="text-white fs-4 fw-bold">Some representative placeholder content for the Third slide.</p>
            </div>
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</body>

</html>
