<!DOCTYPE html>
<html lang="en">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Document</title>

        <link rel="stylesheet" href="./asset/css/style.css">

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    </head>

    <body>
        
        <header>
            <div class="background">
                <h1> Multi-Effect UI Showcase </h1>
                <p> All sections styled without Flexbox </p>
            </div>
        </header>

        <section>
            <div class="title">
                <h2> Layered Profile Card </h2>
            </div>
            <div class="card">
                <div class="card-box">
                    <div class="round">
                        <img src="./asset/image/yug_img.jpeg" alt="yug">
                    </div>
                    <h3> Yug </h3>
                    <p> UI/UX Designer </p>
                </div>
            </div>
            <div class="card">
                <div class="card-box">
                    <div class="round r2">
                        <img src="./asset/image/prince_img.jfif" alt="prince">
                    </div>
                    <h3> Prince </h3>
                    <p> Full Stack Developer </p>
                </div>
            </div>
        </section>
        
        
        <section>
            <div class="title">
                <h2> Quiz Flashcards </h2>
            </div>

            <div class="quiz-card">
                <div class="card-inner">
                    <div class="card-front">
                        <h3> What is HTML? </h3>
                    </div>
                    <div class="card-back">
                        <p> Hypertext Markup Language </p>
                    </div>
                </div>
            </div>
            
            <div class="quiz-card">
                <div class="card-inner">
                    <div class="card-front">
                        <h3> What is CSS? </h3>
                    </div>
                    <div class="card-back">
                        <p>  Cascading Style Sheets </p>
                    </div>
                </div>
            </div>
        </section>
        
        <section>
            <div class="title">
                <h2> Creative Buttons </h2>
            </div>

            <div class="cr-btn">
                <div class="btn">
                    <button> Silde Button </button>
                </div>
            </div>
            
            <div class="cr-btn2">
                <div class="btn2">
                    <button> Glow Button </button>
                </div>
            </div>
        </section>
        
        <section>
            <div class="title">
                <h2> Interactive Image Gallery </h2>
            </div>

            <div class="card-img">
                <div class="img-inner">
                    <img src="./asset/image/img1.jfif" alt="image1">
                </div>
            </div>

            <div class="card-img">
                <div class="img-inner">
                    <img src="./asset/image/img2.jfif" alt="image2">
                </div>
            </div>

            <div class="card-img">
                <div class="img-inner">
                    <img src="./asset/image/img3.jfif" alt="image3">
                </div>
            </div>
        </section>
        
        
    </body>
</html>
